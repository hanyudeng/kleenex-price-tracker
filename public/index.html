<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>舒潔衛生紙價格追蹤站</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#f5f9ff;">

    <!-- 標題區 -->

    <div class="bg-primary text-white py-5 text-center">

        <h1>舒潔衛生紙價格追蹤站</h1>

        <p>
            記錄舒潔衛生紙歷年價格變化
        </p>

    </div>

    <div class="container mt-5">

        <!-- 新增資料 -->

        <div class="card shadow mb-4">

            <div class="card-header bg-primary text-white">

                新增價格資料

            </div>

            <div class="card-body">

                <form id="priceForm">

                    <div class="row">

                        <div class="col-md-4">

                            <label>日期</label>

                            <input
                                type="date"
                                id="date"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-4">

                            <label>商品名稱</label>

                            <input
                                type="text"
                                id="product_name"
                                class="form-control"
                                placeholder="舒潔抽取式衛生紙"
                                required>

                        </div>

                        <div class="col-md-4">

                            <label>商品價格</label>

                            <input
                                type="number"
                                id="price"
                                class="form-control"
                                placeholder="請輸入價格"
                                required>

                        </div>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary mt-3">

                        新增資料ＴＥＳＴ

                    </button>

                </form>

            </div>

        </div>

        <!-- 搜尋 -->

        <div class="card shadow mb-4">

            <div class="card-header bg-success text-white">

                搜尋資料

            </div>

            <div class="card-body">

                <div class="input-group">

                    <input
                        type="text"
                        id="search"
                        class="form-control"
                        placeholder="輸入商品名稱">

                    <button
                        class="btn btn-success"
                        onclick="searchData()">

                        查詢

                    </button>

                    <button
                        class="btn btn-secondary"
                        onclick="loadData()">

                        顯示全部

                    </button>

                </div>

            </div>

        </div>

        <!-- 表格 -->

        <div class="card shadow">

            <div class="card-header bg-dark text-white">

                歷史價格紀錄

            </div>

            <div class="card-body">

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>日期</th>
                            <th>商品名稱</th>
                            <th>價格</th>

                        </tr>

                    </thead>

                    <tbody id="result">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
